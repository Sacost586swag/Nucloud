server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets con hash en el nombre
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cachear el HTML (asi los deploys nuevos se ven al instante)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Archivos SEO: MIME explicito + cache corto (1h) para que las
    # actualizaciones se propaguen rapido tras cada deploy.
    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }
    location = /sitemap.xml {
        default_type application/xml;
        add_header Cache-Control "public, max-age=3600";
    }
    location = /llms.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }

    # Compresion
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain application/xml;
    gzip_min_length 1024;
}
